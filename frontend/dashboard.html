<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Order Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">Order Management</h1>
            <ul class="nav-menu">
                <li><a href="#" onclick="showSection('dashboard')">Dashboard</a></li>
                <li><a href="#" onclick="showSection('products')">Products</a></li>
                <li><a href="#" onclick="showSection('orders')">Orders</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="sidebar">
            <div class="user-info">
                <h3 id="userEmail"></h3>
            </div>
        </div>

        <main class="main-content">
            <!-- Dashboard Section -->
            <section id="dashboard" class="section active">
                <h2>Welcome to Dashboard</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Products</h3>
                        <p id="productCount" class="stat-value">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Total Orders</h3>
                        <p id="orderCount" class="stat-value">0</p>
                    </div>
                </div>
            </section>

            <!-- Products Section -->
            <section id="products" class="section">
                <h2>Products</h2>
                
                <div class="section-controls">
                    <button class="btn btn-primary" onclick="showAddProductForm()">Add Product</button>
                </div>

                <!-- Add Product Form -->
                <div id="addProductForm" class="form-modal" style="display: none;">
                    <div class="modal-content">
                        <span class="close" onclick="closeAddProductForm()">&times;</span>
                        <h3>Add New Product</h3>
                        <form onsubmit="handleAddProduct(event)">
                            <div class="form-group">
                                <label for="productName">Product Name:</label>
                                <input type="text" id="productName" required>
                            </div>
                            <div class="form-group">
                                <label for="productCategory">Category:</label>
                                <input type="text" id="productCategory" required>
                            </div>
                            <div class="form-group">
                                <label for="productPrice">Price:</label>
                                <input type="number" id="productPrice" step="0.01" required>
                            </div>
                            <div class="form-group">
                                <label for="productStock">Stock:</label>
                                <input type="number" id="productStock" required>
                            </div>
                            <div class="form-group">
                                <label for="productBrand">Brand:</label>
                                <input type="text" id="productBrand" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Add Product</button>
                        </form>
                    </div>
                </div>

                <!-- Products List -->
                <div id="productsList" class="products-grid">
                    <p class="loading">Loading products...</p>
                </div>
            </section>

            <!-- Orders Section -->
            <section id="orders" class="section">
                <h2>Orders</h2>
                
                <div class="section-controls">
                    <button class="btn btn-primary" onclick="showCreateOrderForm()">Create Order</button>
                </div>

                <!-- Create Order Form -->
                <div id="createOrderForm" class="form-modal" style="display: none;">
                    <div class="modal-content">
                        <span class="close" onclick="closeCreateOrderForm()">&times;</span>
                        <h3>Create New Order</h3>
                        <form onsubmit="handleCreateOrder(event)">
                            <div class="form-group">
                                <label for="orderProducts">Select Products:</label>
                                <div id="orderProductsList"></div>
                            </div>
                            <div class="form-group">
                                <label for="orderTotal">Total Amount:</label>
                                <input type="number" id="orderTotal" step="0.01" required readonly>
                            </div>
                            <button type="submit" class="btn btn-primary">Place Order</button>
                        </form>
                    </div>
                </div>

                <!-- Orders List -->
                <div id="ordersList" class="orders-table">
                    <p class="loading">Loading orders...</p>
                </div>
            </section>
        </main>
    </div>

    <div id="message" class="message"></div>
    <script src="app.js"></script>
</body>
</html>
