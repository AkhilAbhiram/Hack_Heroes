<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard - Order Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">🛍️ OrderHub - Customer</h1>
            <ul class="nav-menu">
                <li><a href="#" onclick="showSection('shop')">Shop</a></li>
                <li><a href="#" onclick="showSection('myOrders')">My Orders</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="sidebar">
            <div class="user-info">
                <h3 id="userEmail"></h3>
                <p class="user-role">👤 Customer Account</p>
            </div>
            <div class="cart-summary">
                <h4>🛒 Cart Summary</h4>
                <div id="cartItemCount" style="font-size: 24px; font-weight: bold; color: var(--primary-color);">0</div>
                <p>items in cart</p>
                <button class="btn btn-primary" style="width: 100%; margin-top: 10px;" onclick="showSection('checkout')">Go to Checkout</button>
            </div>
        </div>

        <main class="main-content">
            <!-- Shop Section -->
            <section id="shop" class="section active">
                <h2>Browse Products</h2>
                <div class="search-filter">
                    <input type="text" id="searchProducts" placeholder="Search products..." onkeyup="filterProducts()">
                    <select id="categoryFilter" onchange="filterProducts()">
                        <option value="">All Categories</option>
                    </select>
                </div>
                <div id="productsList" class="products-grid">
                    <p class="loading">Loading products...</p>
                </div>
            </section>

            <!-- My Orders Section -->
            <section id="myOrders" class="section">
                <h2>My Orders</h2>
                <div id="ordersList" class="orders-table">
                    <p class="loading">Loading your orders...</p>
                </div>
            </section>

            <!-- Checkout Section -->
            <section id="checkout" class="section">
                <h2>Checkout</h2>
                <div class="checkout-container">
                    <div class="cart-items">
                        <h3>Cart Items</h3>
                        <div id="cartItems"></div>
                        <div class="cart-total">
                            <h4>Total: $<span id="cartTotalPrice">0.00</span></h4>
                        </div>
                    </div>
                    <div class="checkout-form">
                        <h3>Place Order</h3>
                        <form onsubmit="handlePlaceOrder(event)">
                            <div class="form-group">
                                <label>Items Summary:</label>
                                <div id="orderSummary" style="border: 1px solid #ddd; padding: 10px; border-radius: 5px; margin-bottom: 10px;"></div>
                            </div>
                            <div class="form-group">
                                <label for="paymentMethod">Payment Method:</label>
                                <select id="paymentMethod" required>
                                    <option value="">Select Payment Method</option>
                                    <option value="CARD">Credit/Debit Card</option>
                                    <option value="UPIA">UPI</option>
                                    <option value="NET_BANKING">Net Banking</option>
                                    <option value="COD">Cash on Delivery</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="shippingAddress">Shipping Address:</label>
                                <textarea id="shippingAddress" placeholder="Enter your shipping address" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-success" style="width: 100%; padding: 15px; font-size: 16px;">
                                Place Order - $<span id="checkoutTotal">0.00</span>
                            </button>
                        </form>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="message" class="message"></div>
    <script src="customer.js"></script>
</body>
</html>
